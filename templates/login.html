<!DOCTYPE html>
<html>
<head>
<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    background: linear-gradient(135deg, #ffd6a5, #ffb4a2);
}

.box{
    width:320px;
    background:white;
    padding:35px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.logo{
    font-size:26px;
    font-weight:bold;
    color:#d2691e;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ddd;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#f4a261;
    color:white;
    font-size:16px;
}

button:hover{
    background:#e76f51;
}
</style>
</head>

<body>

<div class="box">

    <div class="logo">🐼 Joyness POS</div>

    <form method="post">
        <input name="sifre" type="password" placeholder="Şifre">
        <button>Giriş Yap</button>
    </form>

</div>

</body>
</html>
