<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    font-family:'Segoe UI', Arial;
    background:#f7f8fc;
}

/* HEADER */
.header{
    background:linear-gradient(135deg,#f4a261,#e76f51);
    color:white;
    padding:20px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

/* CONTENT */
.content{
    padding:15px;
}

/* CARD */
.card{
    background:white;
    border-radius:20px;
    padding:20px;
    margin-bottom:15px;
    box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

/* GRID BUTTON */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.btn{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:90px;
    border-radius:18px;
    text-decoration:none;
    color:white;
    font-weight:bold;
    font-size:14px;
    transition:0.2s;
}

.btn:active{
    transform:scale(0.95);
}

/* RENKLER */
.b1{ background:#f4a261; }
.b2{ background:#2a9d8f; }
.b3{ background:#e76f51; }
.b4{ background:#6c5ce7; }

/* ALT MENU */
.bottom{
    position:fixed;
    bottom:0;
    width:100%;
    background:white;
    display:flex;
    justify-content:space-around;
    border-top:1px solid #ddd;
    padding:10px 0;
}

.bottom a{
    text-decoration:none;
    color:#555;
    font-size:13px;
    text-align:center;
}

/* MOBİL */
@media(max-width:600px){
    .btn{
        height:80px;
        font-size:13px;
    }
}
</style>
</head>

<body>

<div class="header">
🐼 Joyness POS
</div>

<div class="content">

<div class="card">
<h3>Hoşgeldin 👋</h3>
<p>Sistem hazır. Hızlı işlemleri kullanabilirsin.</p>
</div>

<div class="grid">

<a href="/kamera" class="btn b1">
📷<br>Barkod Oku
</a>

<a href="/urunler" class="btn b2">
📦<br>Ürünler
</a>

<a href="/ekle" class="btn b3">
➕<br>Ürün Ekle
</a>

<a href="/cikis" class="btn b4">
🚪<br>Çıkış
</a>

</div>

</div>

<!-- ALT MENÜ -->
<div class="bottom">
<a href="/panel">🏠<br>Ana</a>
<a href="/urunler">📦<br>Ürün</a>
<a href="/kamera">📷<br>Okut</a>
<a href="/ekle">➕<br>Ekle</a>
</div>

</body>
</html>
