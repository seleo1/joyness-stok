<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:'Segoe UI', Arial;
    background:#f8f9fb;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:20px;
}

/* CARD */
.card{
    background:white;
    width:100%;
    max-width:420px;
    padding:20px;
    border-radius:18px;
    box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

/* TITLE */
h2{
    margin:0 0 10px;
    color:#333;
}

/* INFO */
.info{
    margin:8px 0;
    color:#555;
    font-size:14px;
}

/* LABEL */
b{
    color:#222;
}

/* BUTTONS */
.btn{
    display:block;
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    text-align:center;
    text-decoration:none;
    font-weight:bold;
    cursor:pointer;
}

.btn-edit{
    background:#f4a261;
    color:white;
}

.btn-edit:hover{
    background:#e76f51;
}

.btn-back{
    background:#ddd;
    color:#333;
}

.btn-back:hover{
    background:#cfcfcf;
}

/* TOP NAV */
.top{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
}

.small-btn{
    font-size:12px;
    padding:6px 10px;
    border-radius:10px;
    text-decoration:none;
    background:#eee;
    color:#333;
}
</style>
</head>

<body>

<div class="card">

    <div class="top">
        <a class="small-btn" href="/urunler">⬅ Ürünler</a>
        <a class="small-btn" href="/panel">🏠 Panel</a>
    </div>

    <h2>{{u["kitap_adi"]}}</h2>

    <div class="info"><b>Barkod:</b> {{u["barkod"]}}</div>
    <div class="info"><b>Kategori:</b> {{u["kategori"]}}</div>
    <div class="info"><b>Alt Kategori:</b> {{u["alt_kategori"]}}</div>
    <div class="info"><b>Yayın:</b> {{u["yayin"]}}</div>
    <div class="info"><b>Stok:</b> {{u["stok"]}}</div>

    <a class="btn btn-edit" href="/duzenle/{{u['id']}}">
        ✏️ Düzenle
    </a>

    <a class="btn btn-back" href="/urunler">
        ⬅ Geri Dön
    </a>

</div>

</body>
</html>
