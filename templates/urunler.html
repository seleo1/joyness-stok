<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:'Segoe UI', Arial;
    display:flex;
    background:#f8f9fb;
}

/* SIDEBAR */
.sidebar{
    width:260px;
    height:100vh;
    background:linear-gradient(180deg,#f7c59f,#f4a9a8);
    padding:15px;
    overflow-y:auto;
    color:white;
}

.sidebar h3{
    font-size:13px;
    margin:15px 0 8px;
    opacity:0.9;
}

.sidebar a{
    display:block;
    padding:10px;
    margin-bottom:6px;
    background:rgba(255,255,255,0.25);
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-size:14px;
}

.sidebar a:hover{
    background:rgba(255,255,255,0.45);
}

.sidebar input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    outline:none;
}

/* CONTENT */
.content{
    flex:1;
    padding:20px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}
